<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Libas Lounge</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#f5f5f7;
text-align:center;
}

.header{
padding:15px;
font-weight:bold;
font-size:18px;
background:#fff;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:#fff;
padding:10px;
border-radius:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.card img{
width:100%;
border-radius:10px;
}

button{
background:#0071e3;
color:#fff;
border:none;
padding:10px;
border-radius:20px;
margin-top:5px;
width:100%;
}

.cart{
position:fixed;
bottom:20px;
right:20px;
background:black;
color:#fff;
padding:12px;
border-radius:50px;
}

.checkout{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:#fff;
display:none;
padding:20px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:10px;
border:1px solid #ddd;
}
</style>
</head>

<body>

<div class="header">Libas Lounge</div>

<div class="grid">

<div class="card">
<img src="https://via.placeholder.com/300">
<h4>Kurti</h4>
<p>Rs 1500</p>
<button onclick="addToCart('Kurti',1500)">Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300">
<h4>Dress</h4>
<p>Rs 2500</p>
<button onclick="addToCart('Dress',2500)">Add to Cart</button>
</div>

</div>

<div class="cart" onclick="openCheckout()">
Cart (<span id="count">0</span>)
</div>

<div class="checkout" id="checkout">
<h2>Checkout</h2>

<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone Number">

<p><b>Payment: Cash on Delivery</b></p>

<button onclick="placeOrder()">Place Order</button>
<button onclick="closeCheckout()">Close</button>
</div>

<script>
let cart=[];

function addToCart(name,price){
cart.push({name,price});
document.getElementById("count").innerText=cart.length;
alert("Added");
}

function openCheckout(){
document.getElementById("checkout").style.display="block";
}

function closeCheckout(){
document.getElementById("checkout").style.display="none";
}

function placeOrder(){

let items="";
let total=0;

cart.forEach(i=>{
items+=i.name+", ";
total+=i.price;
});

let msg=`New Order

Name: ${name.value}
Phone: ${phone.value}
Items: ${items}
Total: Rs ${total}
Payment: COD`;

window.open("https://wa.me/923002292923?text="+encodeURIComponent(msg));

alert("Order Sent on WhatsApp!");

cart=[];
count.innerText=0;
closeCheckout();

}
</script>

</body>
</html>
